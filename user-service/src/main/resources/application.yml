server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:usersdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true        # accesible en http://localhost:8081/h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  # No publiques una clave real: usa JWT_SECRET en tu entorno.
  # Default "demo" en base64 solo para que el ejemplo compile/arranque localmente.
  secret: ${JWT_SECRET:MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=}
  expiration: 86400000   # 24h en milisegundos